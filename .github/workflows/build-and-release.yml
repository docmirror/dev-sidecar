          if-no-files-found: error
      - name: "Upload DevSidecar-${{ steps.package-info.outputs.version }}-windows-arm64.exe"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'windows' }}
        with:
