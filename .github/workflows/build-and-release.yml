name: "Build And Release"

on:
  push:
    branches:
      - release*
    paths-ignore:
      - "_script/**"
      - "doc/**"
      - "**/*.md"
      - "**/.gitignore"
      - "**/LICENSE"
  workflow_dispatch:

jobs:
  # job 1
  build-and-upload:
    runs-on: ${{ contains(matrix.os, '-arm') && matrix.os || format('{0}-latest', matrix.os) }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows
          - ubuntu
          - ubuntu-24.04-arm
          - macos
        node:
          - 22
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.1.7
        with:
          submodules: true
          fetch-depth: 0

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4

      - name: 'Setup Node.js "${{ matrix.node }}.x" environment'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          registry-url: https://npm.pkg.github.com/
          cache: pnpm

      - name: "Setup Python environment, because of electron-builder install-app-deps requires Python setup tools"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Get package info"
        id: package-info
        uses: luizfelipelaviola/get-package-info@v1
        with:
          path: ./packages/gui

      - name: "Print"
        run: |
          echo "version = ${{ steps.package-info.outputs.version }}";
          echo "github.ref_type = ${{ github.ref_type }}";
          echo "github.ref = ${{ github.ref }}";
          echo "github.ref_name = ${{ github.ref_name }}";

      - name: "npm -v | pnpm -v | python --version"
        run: |
          echo "======================================================================";
          echo "npm -v";
          echo "--------------------";
          npm -v;

          echo "======================================================================";
          echo "pnpm -v";
          echo "--------------------";
          pnpm -v;

          echo "======================================================================";
          echo "python --version";
          echo "--------------------";
          python --version;

      - name: "Setup electron cache"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/electron
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: "Setup electron-builder cache"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-builder-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-cache-

      - name: "Set C++17 compiler flags (non-Windows)"
        if: ${{ matrix.os != 'windows' }}
        run: |
          echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
          echo "CFLAGS=-std=c11" >> $GITHUB_ENV

      - name: "Set C++17 compiler flags (Windows)"
        if: ${{ matrix.os == 'windows' }}
        run: |
          echo "CL=/std:c++17" >> $env:GITHUB_ENV

      - name: "'pnpm install' Because we need to install optional dependencies"
        run: |
          echo "======================================================================";
          dir || ls -lah;

          echo "======================================================================";
          echo "pnpm install";
          echo "--------------------";
          pnpm install;

      - name: "test packages/core"
        run: |
          cd packages/core;
          pnpm run test;

      - name: "test packages/mitmproxy"
        run: |
          cd packages/mitmproxy;
          pnpm run test;

      - name: "Cache Flatpak runtime (Linux)"
        if: ${{ matrix.os == 'ubuntu' }}
        id: cache-flatpak-runtime
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-freedesktop-21.08

      - name: "Install Flatpak tooling (Linux)"
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder xdg-desktop-portal appstream fuse3
          # Allow flatpak-builder's bwrap sandbox to create user namespaces on Ubuntu 24.04
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          # Remove bwrap AppArmor profile if present; it can block sandbox operations beyond userns
          sudo apparmor_parser -R /etc/apparmor.d/bwrap 2>/dev/null || true
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          if [ "${{ steps.cache-flatpak-runtime.outputs.cache-hit }}" != "true" ]; then
            flatpak install --user -y flathub org.freedesktop.Platform//21.08 org.freedesktop.Sdk//21.08
          fi
          flatpak --version
          flatpak-builder --version

      # - name: "Cache Flatpak runtime (Linux ARM64)"
      #   if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
      #   id: cache-flatpak-runtime-linux-arm64
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.local/share/flatpak
      #     key: flatpak-runtime-freedesktop-21.08
      #
      # - name: "Install Flatpak tooling (Linux ARM64)"
      #   if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
      #   run: |
      #     sudo apt-get update -y
      #     sudo apt-get install -y flatpak flatpak-builder xdg-desktop-portal appstream fuse3
      #     # Allow flatpak-builder's bwrap sandbox to create user namespaces on Ubuntu 24.04
      #     sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      #     # Remove bwrap AppArmor profile if present; it can block sandbox operations beyond userns
      #     sudo apparmor_parser -R /etc/apparmor.d/bwrap 2>/dev/null || true
      #     flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      #     if [ "${{ steps.cache-flatpak-runtime-linux-arm64.outputs.cache-hit }}" != "true" ]; then
      #       flatpak install --user -y flathub org.freedesktop.Platform//21.08 org.freedesktop.Sdk//21.08
      #     fi
      #     flatpak --version
      #     flatpak-builder --version
      #
      # - name: "Special preparation for Linux ARM64 build"
      #   if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
      #   run: |
      #     echo "======================================================================";
      #     echo "Run _script/linux-arm64-prepare.sh";
      #     echo "--------------------";
      #     bash _script/linux-arm64-prepare.sh;

      - name: "npm run electron:build (Windows/macOS)"
        if: ${{ matrix.os != 'ubuntu' }}
        run: |
          echo "======================================================================";
          echo "cd packages/gui";
          echo "--------------------";
          cd packages/gui;
          dir || ls -lah;

          echo "======================================================================";
          echo "npm run electron:build";
          echo "--------------------";
          npm run electron:build;

      - name: "npm run electron:build (Linux & Linux ARM64)"
        # if: ${{ matrix.os == 'ubuntu' || matrix.os == 'ubuntu-24.04-arm' }}
        if: ${{ matrix.os == 'ubuntu' }}
        env:
          DEBUG: "@malept/flatpak-bundler"
        run: |
          echo "======================================================================";
          echo "cd packages/gui";
          echo "--------------------";
          cd packages/gui;
          ls -lah;

          echo "======================================================================";
          echo "npm run electron:build";
          echo "--------------------";
          dbus-run-session -- npm run electron:build;

      - name: 'Print dir "packages/gui/dist_electron/"'
        run: |
          echo "======================================================================";
          echo "cd packages/gui/dist_electron";
          echo "--------------------";
          cd packages/gui/dist_electron;
          dir || ls -lah;

      # Rename artifacts
      - name: "Rename artifacts - Windows"
        if: ${{ matrix.os == 'windows' }}
        run: |
          cd packages/gui/dist_electron;
          ren DevSidecar-${{ steps.package-info.outputs.version }}-x64.exe   DevSidecar-${{ steps.package-info.outputs.version }}-windows-x86_64.exe;
          ren DevSidecar-${{ steps.package-info.outputs.version }}-ia32.exe  DevSidecar-${{ steps.package-info.outputs.version }}-windows-ia32.exe;
          ren DevSidecar-${{ steps.package-info.outputs.version }}-arm64.exe DevSidecar-${{ steps.package-info.outputs.version }}-windows-arm64.exe;
          ren DevSidecar-${{ steps.package-info.outputs.version }}.exe       DevSidecar-${{ steps.package-info.outputs.version }}-windows-universal.exe;
          dir;
      - name: "Rename artifacts - Linux"
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          cd packages/gui/dist_electron;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-amd64.deb       DevSidecar-${{ steps.package-info.outputs.version }}-linux-x86_64.deb;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-x86_64.AppImage DevSidecar-${{ steps.package-info.outputs.version }}-linux-x86_64.AppImage;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-x64.tar.gz      DevSidecar-${{ steps.package-info.outputs.version }}-linux-x86_64.tar.gz;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-x86_64.rpm      DevSidecar-${{ steps.package-info.outputs.version }}-linux-x86_64.rpm;
          # mv DevSidecar-${{ steps.package-info.outputs.version }}-x86_64.flatpak      DevSidecar-${{ steps.package-info.outputs.version }}-linux-x86_64.flatpak;
          #-------------------------------------------------------------------------------------------------------------------------
          mv DevSidecar-${{ steps.package-info.outputs.version }}-arm64.deb       DevSidecar-${{ steps.package-info.outputs.version }}-linux-arm64.deb;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-arm64.AppImage  DevSidecar-${{ steps.package-info.outputs.version }}-linux-arm64.AppImage;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-arm64.tar.gz    DevSidecar-${{ steps.package-info.outputs.version }}-linux-arm64.tar.gz;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-aarch64.rpm      DevSidecar-${{ steps.package-info.outputs.version }}-linux-arm64.rpm;
          # arm64 flatpak is on Linux ARM64 runner
          #-------------------------------------------------------------------------------------------------------------------------
          mv DevSidecar-${{ steps.package-info.outputs.version }}-armv7l.deb      DevSidecar-${{ steps.package-info.outputs.version }}-linux-armv7l.deb;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-armv7l.AppImage DevSidecar-${{ steps.package-info.outputs.version }}-linux-armv7l.AppImage;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-armv7l.tar.gz   DevSidecar-${{ steps.package-info.outputs.version }}-linux-armv7l.tar.gz;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-armv7l.rpm      DevSidecar-${{ steps.package-info.outputs.version }}-linux-armv7l.rpm;
          # armv7l flatpak is on Linux ARM64 runner
          ls -lah;
      # - name: "Rename artifacts - Linux ARM64"
      #   if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
      #   run: |
      #     mv DevSidecar-${{ steps.package-info.outputs.version }}-arm64.flatpak      DevSidecar-${{ steps.package-info.outputs.version }}-linux-arm64.flatpak;
      #     #-------------------------------------------------------------------------------------------------------------------------
      #     mv DevSidecar-${{ steps.package-info.outputs.version }}-armv7l.flatpak      DevSidecar-${{ steps.package-info.outputs.version }}-linux-armv7l.flatpak;
      #     ls -lah;
      - name: "Rename artifacts - macOS"
        if: ${{ matrix.os == 'macos' }}
        run: |
          cd packages/gui/dist_electron;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-x64.dmg        DevSidecar-${{ steps.package-info.outputs.version }}-macos-x86_64.dmg;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-arm64.dmg      DevSidecar-${{ steps.package-info.outputs.version }}-macos-arm64.dmg;
          mv DevSidecar-${{ steps.package-info.outputs.version }}-universal.dmg  DevSidecar-${{ steps.package-info.outputs.version }}-macos-universal.dmg;
          ls -lah;

      # region Upload artifacts - Windows
      - name: "Upload DevSidecar-${{ steps.package-info.outputs.version }}-windows-x86_64.exe"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'windows' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ steps.package-info.outputs.version }}-windows-x86_64.exe
          name: "DevSidecar-${{ steps.package-info.outputs.version }}-windows-x86_64.exe"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ steps.package-info.outputs.version }}-windows-ia32.exe"
